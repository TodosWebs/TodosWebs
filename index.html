<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuestro juego 💛</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff5f5;
      padding: 40px;
    }
    h1 { font-size: 2.5em; }
    button {
      padding: 12px 20px;
      margin: 8px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #ff7b7b;
      color: white;
    }
    #gameBox {
      margin-top: 30px;
      font-size: 20px;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: inline-block;
      max-width: 500px;
    }
    .menu { margin-top: 20px; }
  </style>
</head>
<body>

<h1>Nuestro juego 💛</h1>

<div class="menu">
  <button onclick="showCategory('random')">🎲 Aleatorio</button>
  <button onclick="showCategory('fun')">😂 Risa</button>
  <button onclick="showCategory('paper')">✍️ Papel</button>
  <button onclick="showCategory('challenges')">🎯 Retos</button>
  <button onclick="showCategory('memory')">🧠 Recuerdos</button>
  <button onclick="showCategory('soft')">❤️ Conexión</button>
  <button onclick="showCategory('roleplay')">🎭 Roleplay</button>
  <button onclick="showCategory('guess')">🧠 Adivinar</button>
  <button onclick="showCategory('prefer')">🤔 Qué prefieres</button>
  <button onclick="showCategory('spicy')">🔥 Picante</button>
  <button onclick="showCategory('photo')">📸 Fotos</button>
  <button onclick="openExternal('flags')">🏳️ Adivina bandera</button>
  <button onclick="openExternal('higherlower')">📊 Higher or Lower</button>
  <button onclick="dailyChallenge()">📅 Reto diario</button>
</div>

<div id="gameBox">Elige un modo para empezar</div>
<button onclick="nextGame()">➡️ Siguiente</button>

<script>

const dailyChallengesList = [
"Mañana graba pequeños momentos de tu día y haz un mini vídeo para enseñarlo por la noche",
"Haz un collage de 6 fotos del color que elijas",
"Mándame 3 fotos durante el día que te recuerden a mí",
"Escríbeme un mensaje bonito inesperado en algún momento del día",
"Haz una foto de algo que te haga sonreír hoy",
"Piensa en 3 cosas que quieras hacer conmigo",
"Graba un audio corto contándome tu mejor momento del día",
"Haz una foto de un sitio donde te gustaría estar conmigo",
"Escribe una frase sobre nosotros y mándamela en el momento menos esperado",
"Haz algo pequeño que te recuerde a mí y cuéntamelo luego"
];

const gameCategories = {

fun: ["¿Qué preferiría yo: pizza o sushi?","¿Qué haría yo en un día libre perfecto?","¿Qué serie diría que es mi favorita?","¿Qué me da más pereza?","¿Qué hago que te parece gracioso?","Imítame durante 30 segundos","Di 2 verdades y 1 mentira","¿Qué diría yo ahora mismo?","¿Qué emoji uso más?","¿Qué comida odiaría comer ahora mismo?"],

paper: ["Escribe 3 cosas que te gustan de mí","Dibuja nuestra primera cita","Escribe una palabra sobre nosotros","Dibuja algo que te recuerde a mí","Escribe algo que te haga reír de mí","Haz un mini mensaje bonito","Escribe un recuerdo feliz","Dibuja un momento gracioso","Escribe algo que quieras hacer conmigo","Haz un dibujo rápido de mí"],

challenges: ["Hazte una foto con algo rojo","Graba un audio imitándome","Busca algo que te recuerde a mí","Haz una cara triste","Haz una cara exagerada","Encuentra algo azul","Di 5 cosas que te gustan de mí en 10s","Canta una frase","Manda un audio random","Enséñame algo curioso de tu habitación"],

memory: ["Nuestro momento más divertido","Nuestro plan más caótico","Un viaje que recuerdes","Una tontería que hicimos","Un momento inesperado","Algo que nos hizo reír mucho","Un recuerdo que te guste","Algo raro que nos pasó","Una cita que repetirías","Un momento simple pero bonito"],

soft: ["Algo que admiro de ti","Un recuerdo feliz contigo","Qué me gusta de nosotros","Algo que valoro de ti","Qué me hace sentir bien contigo","Algo pequeño que me gusta","Un plan que quiero contigo","Algo que me gusta de tu forma de ser","Qué te hace especial para mí","Algo que me hace sonreír contigo"],

roleplay: ["Somos dos desconocidos ligando fatal","Somos una pareja famosa","Somos dos abuelos discutiendo","Primera cita incómoda","Nos reencontramos tras años","Discusión absurda por comida","Somos influencers","Somos compañeros de piso","Somos rivales","Somos actores en una peli"],

guess: ["Adivina qué estoy pensando","Adivina mi comida favorita","Adivina mi plan ideal","Adivina qué me apetece","Adivina mi serie favorita","Adivina qué haría ahora","Adivina qué me molesta","Adivina qué me hace feliz","Adivina qué elegiría","Adivina qué recuerdo diría"],

prefer: ["¿Preferirías viajar siempre o no viajar nunca?","¿Preferirías vivir juntos ya o esperar?","¿Preferirías peli o fiesta?","¿Preferirías montaña o playa?","¿Preferirías cenar fuera o cocinar juntos?","¿Preferirías madrugar o trasnochar?","¿Preferirías ahorrar o gastar en experiencias?","¿Preferirías ver series o hacer planes?","¿Preferirías vivir en ciudad o pueblo?","¿Preferirías una sorpresa o planear todo?"],

spicy: ["¿Qué es lo que más te atrae de mí?","¿Cuál fue el momento en que más te gusté?","¿Qué detalle mío te parece más especial?","¿Qué te gusta que haga contigo?","¿Qué outfit mío te gusta más?","¿Qué plan te parecería más romántico?","¿Qué te gustaría que hiciéramos más juntos?","¿Qué te pone nervioso/a de mí?","¿Qué momento repetirías?","¿Qué te gusta de nuestra química?"],

photo: ["Busca una foto donde salgamos juntos felices","Busca una foto graciosa","Busca una foto que te recuerde a mí","Busca una foto que te guste mucho","Busca una foto antigua tuya","Busca una foto que represente tu día","Busca una foto que te haga reír","Busca una foto que repetirías","Busca una foto de un sitio especial","Busca una foto random y explícamela"]

};

let currentCategory = [];

function showCategory(cat) {
  if (cat === 'random') {
    currentCategory = Object.values(gameCategories).flat();
  } else {
    currentCategory = gameCategories[cat];
  }
  nextGame();
}

function nextGame() {
  if (currentCategory.length === 0) {
    document.getElementById("gameBox").innerText = "Elige un modo primero";
    return;
  }
  const random = Math.floor(Math.random() * currentCategory.length);
  document.getElementById("gameBox").innerText = currentCategory[random];
}

function openExternal(type) {
  if (type === 'flags') {
    window.open('https://worldle.teuteuf.fr/', '_blank');
  }
  if (type === 'higherlower') {
    window.open('https://www.higherlowergame.com/', '_blank');
  }
}

function dailyChallenge() {
  const random = Math.floor(Math.random() * dailyChallengesList.length);
  document.getElementById("gameBox").innerText = "📅 Reto diario:\n" + dailyChallengesList[random];
}

</script>

</body>
</html>
